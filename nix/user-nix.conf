# User-level Nix config. Symlinked to ~/.config/nix/nix.conf by install.sh.
# Generative-specific: adds the private generative-dev cachix binary cache so
# already-built derivations are pulled instead of compiled locally.
#
# No secrets here — netrc-file is only a PATH. The netrc itself (with the auth
# token) lives at ~/.config/nix/netrc and /etc/nix/netrc and is NOT tracked.
substituters = https://cache.nixos.org https://generative-dev.cachix.org
trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= generative-dev.cachix.org-1:inW5Lvz8LHinliyxZoguWSNks8bcYQhLfZRtd+gAcCU=
netrc-file = /Users/gianpi/.config/nix/netrc
