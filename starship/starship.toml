format = """
${custom.direnv}\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$java\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[username]
# Only show when root or SSH — you already know who you are locally
show_always = false
style_user = "bold yellow"
# Red so it screams "you're root, be careful"
style_root = "bold red"

[hostname]
# Only appears over SSH so you always know when you're on a remote box
ssh_only = true
style = "bold red"

[directory]
style = "green"
# Show the full path — no abbreviation or truncation
truncate_to_repo = false
truncation_length = 100

# direnv loads the nix dev shell silently when a terminal opens already inside a
# repo (VS Code), so there's no "direnv: loading" banner like `cd` gives in iTerm.
# DIRENV_DIR is set whenever direnv has an env loaded — show a badge so the nix
# shell is always visible regardless of how the terminal was started.
[custom.direnv]
description = "Show a nix badge when a direnv env is active"
when = "test -n \"$DIRENV_DIR\""
symbol = "❄️"
format = "[$symbol](bold cyan)  "

[git_branch]
style = "bold purple"

[git_status]
# Same symbols Mathias uses: + staged, ! modified, ? untracked, $ stashed
staged = "[+](green)"
modified = "[!](yellow)"
untracked = "[?](blue)"
stashed = "[$](cyan)"

[cmd_duration]
# Only show elapsed time for slow commands — useful for spotting bottlenecks
min_time = 2000

[character]
# Green on success, red on failure — instant visual feedback on last command
success_symbol = "[\\$](bold)"
error_symbol = "[\\$](bold red)"
