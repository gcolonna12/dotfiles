# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

gui:
  nerdFontsVersion: "3"
  border: rounded
  showRandomTip: false
  showCommandLog: false
  showPanelJumps: false
  expandFocusedSidePanel: true
  showNumstatInFilesView: true
  showDivergenceFromBaseBranch: arrowAndNumber
  skipNoStagedFilesWarning: true
  skipRewordInEditorWarning: true
  skipStashWarning: true
  theme:
    lightTheme: true
    activeBorderColor:
      - "#8da101"
      - bold
    inactiveBorderColor:
      - "#a6b0a0"
    searchingActiveBorderColor:
      - "#dfa000"
      - bold
    optionsTextColor:
      - "#35a77c"
    selectedLineBgColor:
      - "#edeada"
    cherryPickedCommitFgColor:
      - "#5c6a72"
    cherryPickedCommitBgColor:
      - "#dfa000"
    unstagedChangesColor:
      - "#f85552"
    defaultFgColor:
      - "#5c6a72"
  authorColors:
    "gcolonna12": "magenta"

git:
  commit:
    autoWrapCommitMessage: true
    autoWrapWidth: 72
  autoFetch: true
  autoRefresh: true
  log:
    order: topo-order
    showGraph: always
  pagers:
    - pager: delta --light --paging=never
      colorArg: always

os:
  editPreset: "vscode"

disableStartupPopups: true
confirmOnQuit: false

customCommands:
  - key: "<c-v>"
    context: "global"
    description: "Create conventional commit"
    prompts:
      - type: "menu"
        key: "Type"
        title: "Type of change"
        options:
          - name: "feat"
            description: "A new feature"
            value: "feat"
          - name: "fix"
            description: "A bug fix"
            value: "fix"
          - name: "chore"
            description: "Other changes that don't modify src or test files"
            value: "chore"
          - name: "refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "docs"
            description: "Documentation only changes"
            value: "docs"
          - name: "test"
            description: "Adding or correcting tests"
            value: "test"
          - name: "ci"
            description: "Changes to CI configuration"
            value: "ci"
          - name: "perf"
            description: "A code change that improves performance"
            value: "perf"
      - type: "input"
        title: "Scope (optional)"
        key: "Scope"
        initialValue: ""
      - type: "menu"
        key: "Breaking"
        title: "Breaking change"
        options:
          - name: "no"
            value: ""
          - name: "yes"
            value: "!"
      - type: "input"
        title: "Commit message"
        key: "Message"
        initialValue: ""
    command: "git commit --message '{{.Form.Type}}{{ if .Form.Scope }}({{ .Form.Scope }}){{ end }}{{.Form.Breaking}}: {{.Form.Message}}'"
    loadingText: "Creating conventional commit..."

  - key: "G"
    command: "gh pr view -w {{.SelectedLocalBranch.Name}}"
    context: "localBranches"
    description: "Open GitHub PR in browser"

  - key: "G"
    command: "gh pr view -w"
    context: "commits"
    description: "Open GitHub PR in browser"

  - key: "w"
    context: "files"
    description: "WIP commit"
    command: "git add -A && git commit -m 'wip' || true"

  - key: "P"
    command: "git push {{.SelectedRemote.Name}} {{.SelectedLocalCommit.Sha}}:{{.SelectedLocalBranch.Name}}"
    context: "commits"
    loadingText: "Pushing commit..."
    description: "Push up to selected commit"

  - key: "x"
    command: |
      git fetch -p && for branch in $(git for-each-ref --format '%(refname) %(upstream:track)' refs/heads | awk '$2 == "[gone]" {sub("refs/heads/", "", $1); print $1}'); do git branch -D $branch; done
    context: "localBranches"
    description: "Prune local branches deleted on remote"
    loadingText: "Pruning gone branches..."
