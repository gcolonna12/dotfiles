# Ctrl+A is easier to reach than the default Ctrl+B (left hand stays on home row)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Navigate copy mode with hjkl instead of arrow keys — consistent with vim muscle memory
setw -g mode-keys vi

# Reload config without restarting tmux — essential while tweaking this file
unbind r
bind r source-file ~/.tmux.conf

# Use fish as the default shell — tmux reads $SHELL at server start, which can
# disagree with the system login shell (dscl). Explicit is better than implicit.
set -g default-shell /opt/homebrew/bin/fish

# tmux-256color supports modern key sequences and true color; screen-256color is legacy
set -g default-terminal "tmux-256color"

# Forward VSCode IPC vars so tools like Claude Code can open diffs in the editor
set -ga update-environment " VSCODE_GIT_ASKPASS_NODE VSCODE_GIT_ASKPASS_EXTRA_ARGS VSCODE_GIT_ASKPASS_MAIN VSCODE_GIT_IPC_HANDLE VSCODE_IPC_HOOK_CLI VSCODE_INJECTION"

# Scrollback large enough to review build logs without losing the top
set -g history-limit 50000

# Reduce escape key delay — without this, vim inside tmux feels laggy
set -sg escape-time 10

# Renumber windows after closing one — keeps them in a neat 1,2,3 order instead of leaving gaps (e.g. 1,3,4)
set-option -g renumber-windows on

# Pass through extended key sequences (e.g. Option+Enter) to applications
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Start window/pane numbering at 1 — matches keyboard layout (1 is leftmost, not 0)
set -g base-index 1
setw -g pane-base-index 1

# | looks like a vertical split, - looks like a horizontal split
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Session picker sorted alphabetically — matches tmux-agent-indicator's session
# dots so the Nth moon corresponds to the Nth row in the picker.
bind s choose-tree -Zs -O name

# Navigate panes (no prefix needed — Alt+hjkl)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Mouse support — click to select panes, scroll, resize
set -g mouse on

# 1 line per scroll tick — smooth trackpad scrolling (default 5 is way too jumpy)
bind -T copy-mode-vi WheelUpPane send -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send -X -N 1 scroll-down

# Copy to system clipboard via OSC 52 — works cross-platform and over SSH
# Requires iTerm2: Preferences > General > Selection > "Applications in terminal may access clipboard"
set -s set-clipboard on
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar — uses ANSI colors from terminal palette (iTerm2 is the source of truth)
set -g status-left-length 50
set -g status-left " #{?client_prefix,#[bold]^A #[default],}#S "
set -g status-style "bg=colour7,fg=colour0"
set -g window-status-current-style "bold"
set -g pane-border-lines heavy
set -g pane-border-style "fg=colour0"
set -g pane-active-border-style "fg=colour3"

# List of plugins

# Enable sessions to survive restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Visual indicator (pane border, window title) when an AI agent is running,
# needs input, or finishes. Hooks for Claude Code are wired in claude/settings.json.
set -g @plugin 'accessd/tmux-agent-indicator'

# Session dots in the status bar: one symbol per tmux session.
# Active = full moon, inactive = new moon, attention (agent needs input or done) = robot.
set -g @agent-indicator-session-dots-active '🌕'
set -g @agent-indicator-session-dots-inactive '🌑'
set -g @agent-indicator-session-dots-attention '🤖'
set -g status-right '#{agent_session_dots} %H:%M %d-%b-%y'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'